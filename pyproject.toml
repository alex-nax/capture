[project]
name = "capture-mcp"
version = "0.1.0"
description = "MCP server that captures a process's window (timestamped screenshots), stdout/stderr, and per-app audio transcribed by a pluggable ASR backend."
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.2.0",
    "anyio>=4.5",
    "numpy>=1.24",
    "pyobjc-framework-Quartz>=10.0",
]

[project.optional-dependencies]
# Apple-Silicon-native default ASR backend.
mlx = ["mlx-whisper>=0.4.0"]
# Cross-platform CPU/GPU ASR backend.
whisper = ["faster-whisper>=1.0.0"]
# Remote NVIDIA Riva / Nemotron streaming backend.
riva = ["nvidia-riva-client>=2.15.0"]

[project.scripts]
capture-mcp = "capture_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/capture_mcp"]
